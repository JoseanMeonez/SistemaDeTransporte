<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Rutas - Sistema de Transporte</ui:define>

    <ui:define name="content">
        <section class="page-hero">
            <div>
                <p class="hero-kicker">Catálogo operativo</p>
                <h2 class="page-title">Gestión de rutas</h2>
                <p class="page-subtitle">
                    Registra, edita e inactiva rutas de transporte con control centralizado.
                </p>
            </div>

            <p:button value="Volver al panel" outcome="menu" icon="pi pi-home" styleClass="quick-action-button quick-action-button--secondary" />
        </section>

        <h:form id="formLista">
            <p:growl id="msjs" showDetail="true" />

            <div class="surface-card feature-panel">
                <div class="toolbar-shell">
                    <span class="status-chip status-chip--info">
                        <i class="pi pi-map"></i>
                        #{empty rutaBean.listaRutas ? 0 : rutaBean.listaRutas.size()} rutas activas
                    </span>

                    <p:commandButton value="Nueva Ruta"
                                     icon="pi pi-plus"
                                     actionListener="#{rutaBean.prepararNuevo()}"
                                     oncomplete="PF('dlgRuta').show()"
                                     update=":formDialogo:pnlRuta"
                                     styleClass="ui-button-success" />
                </div>

                <p:dataTable id="dt-rutas"
                             value="#{rutaBean.listaRutas}"
                             var="r"
                             paginator="true"
                             rows="5"
                             emptyMessage="No hay rutas registradas."
                             styleClass="app-table">
                    <p:column headerText="Ruta">#{r.nombreRuta}</p:column>
                    <p:column headerText="Origen">#{r.origen}</p:column>
                    <p:column headerText="Destino">#{r.destino}</p:column>
                    <p:column headerText="Distancia Km">#{r.distanciaKm}</p:column>
                    <p:column headerText="Acciones">
                        <p:commandButton icon="pi pi-pencil"
                                         update=":formDialogo:pnlRuta"
                                         oncomplete="PF('dlgRuta').show()">
                            <f:setPropertyActionListener value="#{r}" target="#{rutaBean.ruta}" />
                        </p:commandButton>
                        <p:commandButton icon="pi pi-trash"
                                         actionListener="#{rutaBean.eliminar(r.id)}"
                                         update="@form"
                                         styleClass="ui-button-danger">
                            <p:confirm header="Confirmación"
                                       message="¿Inactivar ruta?"
                                       icon="pi pi-exclamation-triangle" />
                        </p:commandButton>
                    </p:column>
                </p:dataTable>

                <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                    <p:commandButton value="Sí" type="button" styleClass="ui-confirmdialog-yes" />
                    <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no" />
                </p:confirmDialog>
            </div>
        </h:form>

        <p:dialog header="Datos de Ruta"
                  widgetVar="dlgRuta"
                  modal="true"
                  responsive="true"
                  width="560"
                  styleClass="app-dialog">
            <h:form id="formDialogo">
                <p:outputPanel id="pnlRuta">
                    <h:panelGrid columns="2">
                        <p:outputLabel value="Nombre Ruta" />
                        <p:inputText value="#{rutaBean.ruta.nombreRuta}" required="true" />

                        <p:outputLabel value="Origen" />
                        <p:inputText value="#{rutaBean.ruta.origen}" required="true" />

                        <p:outputLabel value="Destino" />
                        <p:inputText value="#{rutaBean.ruta.destino}" required="true" />

                        <p:outputLabel value="Distancia (Km)" />
                        <p:inputNumber value="#{rutaBean.ruta.distanciaKm}" decimalPlaces="2" minValue="0" />
                    </h:panelGrid>
                    <p:commandButton value="Guardar"
                                     actionListener="#{rutaBean.guardar()}"
                                     update=":formLista:dt-rutas :formLista:msjs"
                                     oncomplete="PF('dlgRuta').hide()"
                                     styleClass="quick-action-button mt-3" />
                </p:outputPanel>
            </h:form>
        </p:dialog>
    </ui:define>
</ui:composition>
